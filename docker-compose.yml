# Redpanda is Kafka-API-compatible but ships as a single binary/container —
# no Zookeeper, no multi-service cluster to wire up. Same concepts as real
# Kafka (topics, partitions, consumer groups), a fraction of the setup pain.
services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
    ports:
      - "9092:9092"   # Kafka API — this is what producer.py / consumer.py talk to
      - "8082:8082"   # HTTP proxy
      - "9644:9644"   # Admin API / metrics

  console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    container_name: redpanda-console
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8080:8080"   # Web UI — watch topics, partitions and messages live
